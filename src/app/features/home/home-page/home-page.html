<div class="relative z-10 text-center">

    <!-- Title -->
    <h1 class="text-5xl font-bold text-red-500 mb-4 drop-shadow-lg">
        🎭 IMPOSTEUR
    </h1>

    <p class="text-gray-400 mb-10">
        Trouve le menteur avant qu'il ne gagne...
    </p>

    <!-- Buttons -->
    <div class="flex flex-col gap-4 items-center">

        <!-- Play -->
        <button id="play-button" (click)="goToLobby()"
            class="w-56 bg-green-500 hover:bg-green-600 px-6 py-3 rounded-xl text-lg font-bold shadow-lg hover:shadow-green-400/50 transition">
            ▶ Jouer
        </button>

        <!-- Settings -->
        <button id="settings-button" (click)="goToSettings()"
            class="w-56 bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-xl text-lg font-bold shadow-lg transition">
            ⚙ Paramètres
        </button>

    </div>
</div>
